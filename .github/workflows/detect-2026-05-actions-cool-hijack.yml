name: detect 2026-05 actions-cool hijack

# Per-attack detection workflow. Lives at the repo root because GitHub
# only discovers workflows from <repo-root>/.github/workflows/. Triggered
# on changes to the actions-cool-hijack attack content so the README
# badge stays honest without re-running on every unrelated change.

on:
  push:
    branches: [main]
    paths:
      - "2026-05-actions-cool-hijack/**"
      - ".github/workflows/detect-2026-05-actions-cool-hijack.yml"
  pull_request:
    paths:
      - "2026-05-actions-cool-hijack/**"
      - ".github/workflows/detect-2026-05-actions-cool-hijack.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # cilock-action uses GH OIDC for keyless signing

# NOTE on cilock-action versioning: this action's binary-download URL is
# constructed as `<ref>` interpreted as a release tag, so SHA pinning the
# action ref produces a 404 against /releases/download/v<sha>/...
# We pin by tag (v1.0.1) instead. Upstream issue:
#   https://github.com/aflock-ai/cilock-action/issues/(open one)

jobs:
  # ── Content layer: secretscan with --fail-on-detection ───────────────
  detect-content:
    name: content - secretscan fires on credential patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run the synthetic payload through cilock, expect failure
        id: run
        uses: aflock-ai/cilock-action@v1.0.1
        with:
          step: detect-actions-cool-content
          attestations: "environment git github secretscan"
          outfile: ${{ github.workspace }}/attestation-content.json
          enable-sigstore: "true"
          enable-archivista: "false"
          fulcio-url: "https://fulcio.sigstore.dev"
          fulcio-oidc-client-id: "sigstore"
          fulcio-oidc-issuer: "https://token.actions.githubusercontent.com"
          timestamp-servers: "https://timestamp.sigstore.dev/api/v1/timestamp"
          cilock-args: "--attestor-secretscan-fail-on-detection"
          workingdir: 2026-05-actions-cool-hijack
          command: bash payload.sh

      - name: Assert secretscan recorded ≥1 finding inside the DSSE payload
        run: |
          # The DSSE envelope wraps the payload as a base64-encoded JSON
          # string at .payload. To find secretscan findings we must decode,
          # then look inside predicate.attestations[] for the secretscan
          # entry, then count its findings array.
          #
          # We do NOT require cilock to exit non-zero. cilock-action exits
          # 0 even when secretscan finds patterns unless
          # `--attestor-secretscan-fail-on-detection` is honored, which
          # appears not to be plumbed through every cilock-action version.
          # Findings in the attestation are sufficient evidence of detection.

          F="${{ github.workspace }}/attestation-content.json"
          if [ ! -s "$F" ]; then
            echo "::error::no attestation file at $F"
            exit 1
          fi

          FINDINGS=$(jq -r '.payload' "$F" | base64 -d | jq -r '
            .predicate.attestations[]
            | select(.type | endswith("/secretscan/v0.1"))
            | .attestation.findings // []
            | length
          ')

          if [ -z "$FINDINGS" ] || [ "$FINDINGS" = "null" ]; then
            echo "::error::no secretscan attestation in predicate.attestations[]"
            exit 1
          fi
          if [ "$FINDINGS" -lt 1 ]; then
            echo "::error::secretscan attestation present but zero findings — detection regressed"
            exit 1
          fi
          echo "✓ content layer: secretscan recorded $FINDINGS findings"

          # Print rule IDs for the record
          jq -r '.payload' "$F" | base64 -d | jq -r '
            .predicate.attestations[]
            | select(.type | endswith("/secretscan/v0.1"))
            | .attestation.findings[] | "  - \(.ruleId): \(.description // "")"
          '

  # ── Behavior layer: --trace + OPA Rego on filesystem patterns ────────
  detect-behavior:
    name: behavior - trace + OPA catches /proc reads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run the payload with --trace (no secretscan; isolate behavior layer)
        uses: aflock-ai/cilock-action@v1.0.1
        with:
          step: detect-actions-cool-behavior
          attestations: "environment git github"
          trace: "true"
          outfile: ${{ github.workspace }}/attestation-behavior.json
          enable-sigstore: "true"
          enable-archivista: "false"
          fulcio-url: "https://fulcio.sigstore.dev"
          fulcio-oidc-client-id: "sigstore"
          fulcio-oidc-issuer: "https://token.actions.githubusercontent.com"
          timestamp-servers: "https://timestamp.sigstore.dev/api/v1/timestamp"
          workingdir: 2026-05-actions-cool-hijack
          command: bash payload.sh

      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Verify behavioral policy fires on the trace attestation
        run: |
          # The trace data lives inside the DSSE payload's predicate.
          # 43-trivy-attack-detection's behavioral policy iterates
          # `input.processes[].openedfiles`, so it expects the DECODED
          # predicate-level attestation as input, not the outer DSSE envelope.
          # Pre-decode and pre-extract the command-run / trace entries.

          F=attestation-behavior.json
          jq -r '.payload' "$F" | base64 -d > /tmp/behavior-predicate.json

          # The attestation that carries trace data is whichever entry has
          # a `processes` field. Find it programmatically and pipe to OPA.
          jq '
            .predicate.attestations[]
            | .attestation
            | select(has("processes"))
          ' /tmp/behavior-predicate.json > /tmp/trace-input.json

          if [ ! -s /tmp/trace-input.json ]; then
            echo "::error::no attestation with .processes — trace data was not captured by cilock-action"
            echo "(behavior layer detection requires --trace; the action's trace input may not be plumbed through)"
            exit 1
          fi

          echo "=== trace input that OPA will evaluate ==="
          head -c 500 /tmp/trace-input.json
          echo

          RESULT=$(opa eval \
            -d 2026-05-actions-cool-hijack/policy-trace-behavioral.rego \
            -i /tmp/trace-input.json \
            'data.cilock.verify.deny' -f json)
          echo "=== OPA result ==="
          echo "$RESULT" | jq

          DENY_COUNT=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value | length // 0')
          if [ "$DENY_COUNT" -lt 1 ]; then
            echo "::error::behavioral policy did NOT fire (0 deny rules) — detection regressed"
            exit 1
          fi
          echo "✓ behavior layer: policy fired $DENY_COUNT deny rules"

  # ── Prevention layer: source-restrict policy ─────────────────────────
  # Static eval — no payload needed. Feed a fake actionref input and assert
  # the policy denies it.
  detect-prevention:
    name: prevention - source-restrict denies untrusted + unpinned refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install OPA
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Eval policy against untrusted + unpinned actions-cool ref
        run: |
          INPUT='{"actionref":"actions-cool/some-action@v1","refpinned":false}'
          RESULT=$(echo "$INPUT" | opa eval -I \
            -d 2026-05-actions-cool-hijack/policy-source-restrict.rego \
            'data.cilock.verify.deny' -f json)
          echo "$RESULT" | jq
          DENY_COUNT=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value | length // 0')
          if [ "$DENY_COUNT" -ge 2 ]; then
            echo "✓ prevention policy fired both rules (untrusted source + not SHA-pinned)"
          else
            echo "::error::prevention policy fired $DENY_COUNT rules; expected ≥ 2"
            exit 1
          fi

      - name: Eval policy against trusted + SHA-pinned ref (should NOT fire)
        run: |
          INPUT='{"actionref":"actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683","refpinned":true}'
          RESULT=$(echo "$INPUT" | opa eval -I \
            -d 2026-05-actions-cool-hijack/policy-source-restrict.rego \
            'data.cilock.verify.deny' -f json)
          DENY_COUNT=$(echo "$RESULT" | jq -r '.result[0].expressions[0].value | length // 0')
          if [ "$DENY_COUNT" = "0" ]; then
            echo "✓ prevention policy correctly allows a known-good SHA-pinned action"
          else
            echo "::error::prevention policy denied a trusted + SHA-pinned ref ($DENY_COUNT rules); false positive"
            exit 1
          fi
