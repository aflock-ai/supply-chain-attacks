name: ci

# Top-level CI for the attack catalog. Fans out to each attack's own
# detect.yml workflow if one exists. Each attack subdirectory is independent
# — a failing detection in one attack doesn't fail the others.
#
# A subdir is included in the matrix only if it has a `.github/workflows/detect.yml`.
# Stub-only attacks (README.md only) are listed in the README's status column as
# "implementation pending" and skipped by this matrix until they ship a workflow.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    name: discover attack directories with detect.yml
    runs-on: ubuntu-latest
    outputs:
      attacks: ${{ steps.list.outputs.attacks }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: List attack dirs that ship a detect.yml
        id: list
        run: |
          # Each dir that matches YYYY-MM-<slug> and has .github/workflows/detect.yml
          # gets added to the matrix.
          dirs=$(find . -maxdepth 1 -type d -name '20*-*' | sort | while read d; do
            wf="$d/.github/workflows/detect.yml"
            if [ -f "$wf" ]; then
              echo "$(basename $d)"
            fi
          done)
          echo "discovered:"
          echo "$dirs"

          # Emit as JSON array for matrix.include
          json=$(echo "$dirs" | jq -R . | jq -s -c .)
          echo "attacks=$json" >> "$GITHUB_OUTPUT"

  detect:
    name: detect / ${{ matrix.attack }}
    needs: discover
    if: ${{ needs.discover.outputs.attacks != '[]' && needs.discover.outputs.attacks != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        attack: ${{ fromJSON(needs.discover.outputs.attacks) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Invoke ${{ matrix.attack }}'s detection workflow inline
        # Each attack ships its own detect.yml with full setup. We re-run its
        # jobs here so a single CI invocation gives us one badge per attack.
        # The simplest reliable way to do that without GH Actions reusable-
        # workflow gymnastics is to source the cilock-action step config from
        # the attack's detect.yml. For the first cut we just announce that
        # the per-attack workflow exists; the actual detection job runs in
        # parallel via the attack's own on:push trigger.
        run: |
          echo "Attack '${{ matrix.attack }}' has its own detect.yml at"
          echo "  ${{ matrix.attack }}/.github/workflows/detect.yml"
          echo "which runs automatically on push (see paths filter)."
          echo
          echo "See the attack's CI history for the per-layer detection result."
